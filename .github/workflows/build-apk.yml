Name: Build Android APK

On:
name: Build APK

on:
  # เพิ่มบรรทัดนี้เข้าไป เพื่อให้ปุ่ม Run workflow แสดงขึ้นมา
  workflow_dispatch:

  # ส่วนอันนี้คือ Trigger เดิมของคุณ (ถ้ามี เช่น ทำงานเมื่อ push)
  push:
    branches: [ "main" ]

jobs:
  # ... โค้ดเดิมของคุณด้านล่าง ...

  Push:
    Branches: [ main ]
  Workflow_dispatch:

Jobs:
  Build:
    Name: Build APK
    Runs-on: ubuntu-latest

    Steps:
      - name: Checkout code
        Uses: actions/checkout@v4

      - name: Set up JDK 17
        Uses: actions/setup-java@v4
        With:
          Java-version: '17'
          Distribution: 'temurin'
          # ใช้กลไก Cache ในตัวของ setup-java เลย เสถียรและปลอดภัยกว่าแยกทำเอง
          Cache: gradle

      - name: Make gradlew executable
        # จุดสำคัญ: มอบสิทธิ์ให้ไฟล์ในโปรเจกต์ของพี่ทำงานได้
        Run: chmod +x ./gradlew

      - name: Build debug APK
        Run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        Uses: actions/upload-artifact@v4
        With:
          Name: Immersive-RP-v2-debug-apk
          # ใช้เครื่องหมาย * ดักทางไว้ เผื่อชื่อไฟล์ APK ข้างในถูกเปลี่ยน
          Path: app/build/outputs/apk/debug/*.apk
          Retention-days: 30

      - name: Build release APK (unsigned)
        Run: ./gradlew assembleRelease --no-daemon
        # ใส่ดักไว้เผื่อฝั่ง Release ยังไม่ได้เซตคีย์ จะได้ไม่ทำระบบล่ม
        Continue-on-error: true

      - name: Upload release APK (unsigned)
        Uses: actions/upload-artifact@v4
        With:
          Name: Immersive-RP-v2-release-apk
          Path: app/build/outputs/apk/release/*.apk
          Retention-days: 30
        Continue-on-error: true

